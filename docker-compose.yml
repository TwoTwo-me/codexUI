name: ${COMPOSE_PROJECT_NAME:-codexui-hub}

services:
  hub:
    container_name: ${CODEXUI_CONTAINER_NAME:-codexui-hub}
    image: ${CODEXUI_IMAGE:-codexui-hub:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CODEX_CLI_VERSION: ${CODEXUI_CODEX_CLI_VERSION:-0.110.0}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      HOME: /data
      CODEX_HOME: /data/codex-home
      CODEXUI_BIND_HOST: ${CODEXUI_BIND_HOST:-0.0.0.0}
      CODEXUI_PORT: ${CODEXUI_PORT:-4300}
      CODEXUI_ADMIN_USERNAME: ${CODEXUI_ADMIN_USERNAME:-admin}
      CODEXUI_ADMIN_PASSWORD: ${CODEXUI_ADMIN_PASSWORD:-change-me-now}
      CODEXUI_ADMIN_PASSWORD_FILE: ${CODEXUI_ADMIN_PASSWORD_FILE:-}
      CODEXUI_SKIP_CODEX_LOGIN: ${CODEXUI_SKIP_CODEX_LOGIN:-true}
      CODEXUI_OPEN_BROWSER: ${CODEXUI_OPEN_BROWSER:-false}
    ports:
      - "${CODEXUI_EXPOSE_HOST:-0.0.0.0}:${CODEXUI_HOST_PORT:-4300}:${CODEXUI_PORT:-4300}"
    volumes:
      - ${CODEXUI_DATA_DIR:-./.data/hub}:/data
      - ${CODEXUI_WORKSPACE_DIR:-./workspace}:/workspace
      - ${CODEXUI_CODEX_HOME_DIR:-./docker/local-codex}:/data/codex-home
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const port=process.env.CODEXUI_PORT||'4300';fetch('http://127.0.0.1:' + port + '/auth/session').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1));",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
